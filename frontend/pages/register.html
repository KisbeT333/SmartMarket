    <!DOCTYPE html>
    <html lang="vi">

    <head>
        <meta charset="UTF-8">

        <meta name="viewport"
            content="width=device-width, initial-scale=1.0">

        <title>Đăng ký - SmartMarket</title>

        <!-- GOOGLE FONT -->
        <link rel="preconnect"
            href="https://fonts.googleapis.com">

        <link rel="preconnect"
            href="https://fonts.gstatic.com"
            crossorigin>

        <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700&display=swap"
            rel="stylesheet">

        <!-- FONT AWESOME -->
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

        <!-- CSS -->
        <link rel="stylesheet"
            href="../css/register.css">
    </head>

    <body>

        <div class="wrapper">

            <!-- LEFT -->
            <div class="left">

                <div class="form-box">

                    <h2>
                        Đăng ký
                    </h2>

                    <form id="registerForm">

                        <!-- USERNAME -->
                        <div class="form-group">

                            <label>
                                Tên đăng nhập
                            </label>

                            <input type="text"
                                id="username"
                                placeholder="Nhập tên đăng nhập"
                                required>

                        </div>

                        <!-- FULL NAME -->
                        <div class="form-group">

                            <label>
                                Họ và tên
                            </label>

                            <input type="text"
                                id="full_name"
                                placeholder="Nhập họ và tên"
                                required>

                        </div>

                        <!-- PHONE -->
                        <div class="form-group">

                            <label>
                                Số điện thoại
                            </label>

                            <input type="text"
                                id="phone"
                                placeholder="Nhập số điện thoại"
                                required>

                        </div>

                        <!-- EMAIL -->
                        <div class="form-group">

                            <label>
                                Email
                            </label>

                            <input type="email"
                                id="email"
                                placeholder="Nhập email">

                        </div>

                        <!-- PASSWORD -->
                        <div class="form-group">

                            <label>
                                Mật khẩu
                            </label>

                            <input type="password"
                                id="password"
                                placeholder="Nhập mật khẩu"
                                required>

                        </div>

                        <!-- CONFIRM PASSWORD -->
                        <div class="form-group">

                            <label>
                                Xác nhận mật khẩu
                            </label>

                            <input type="password"
                                id="confirm_password"
                                placeholder="Nhập lại mật khẩu"
                                required>

                        </div>

                        <!-- BUTTON -->
                        <button type="submit">

                            Đăng ký tài khoản

                        </button>

                    </form>

                    <!-- MESSAGE -->
                    <p id="message"></p>

                    <!-- LOGIN -->
                    <div class="login-link">

                        Đã có tài khoản?

                        <a href="login.html">

                            Đăng nhập ngay

                        </a>

                    </div>

                </div>

            </div>

            <!-- RIGHT -->
            <div class="right">

                <div class="circle">

                    <div class="brand">

                        <h1>
                            Smart<span>Market</span>
                        </h1>

                        <p>
                            Nền tảng quản lý chợ thông minh giúp
                            số hóa toàn bộ quy trình vận hành,
                            kết nối ban quản lý, tiểu thương
                            và khách hàng trên cùng một hệ thống.
                        </p>

                    </div>

                </div>

            </div>

        </div>

        <!-- JS -->
        <script src="../js/register.js"></script>

    </body>

    </html>
