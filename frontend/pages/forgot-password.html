<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Quên mật khẩu</title>

    <link rel="stylesheet"
          href="../css/login.css">
</head>

<body>

<div class="wrapper">

    <div class="left">

        <div class="form-box">

            <h2>Quên mật khẩu</h2>

            <p class="subtitle">
                Nhập email để nhận link đổi mật khẩu
            </p>

            <form id="forgotForm">

                <div class="form-group">

                    <label>Email</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Nhập email"
                        required>

                </div>

                <button type="submit">
                    Gửi email
                </button>

            </form>

            <p id="message"></p>

            <div class="login-link">

                <a href="login.html">
                    Quay lại đăng nhập
                </a>

            </div>

        </div>

    </div>

    <div class="right">

        <div class="circle">

            <div class="brand">

                <h1>
                    Smart<span>Market</span>
                </h1>

            </div>

        </div>

    </div>

</div>

<script>

const form =
    document.getElementById('forgotForm');

const message =
    document.getElementById('message');



form.addEventListener('submit', async (e) => {

    e.preventDefault();

    const email =
        document.getElementById('email').value;



    try {

        const response =
            await fetch(

                'http://127.0.0.1:3000/api/forgot-password',

                {
                    method:'POST',

                    headers:{
                        'Content-Type':'application/json'
                    },

                    body:JSON.stringify({
                        email
                    })
                }

            );



        const data =
            await response.json();



        if(data.success){

            message.style.color =
                'green';

            message.innerText =
                data.message;

        }
        else{

            message.style.color =
                'red';

            message.innerText =
                data.message;

        }

    }

    catch (error) {

        message.innerText =
            'Lỗi server';

    }

});

</script>

</body>
</html>
