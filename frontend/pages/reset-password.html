<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Đổi mật khẩu</title>

    <link rel="stylesheet"
          href="../css/login.css">
</head>

<body>

<div class="wrapper">

    <div class="left">      

        <div class="form-box">

            <h2>Đổi mật khẩu</h2>

            <p class="subtitle">
                Nhập mật khẩu mới
            </p>

            <form id="resetForm">

                <div class="form-group">

                    <label>Mật khẩu mới</label>

                    <input
                        type="password"
                        id="password"
                        placeholder="Nhập mật khẩu mới"
                        required>

                </div>

                <button type="submit">
                    Đổi mật khẩu
                </button>

            </form>

            <p id="message"></p>

        </div>

    </div>

    <div class="right">

        <div class="circle">

            <div class="brand">

                <h1>
                    Smart<span>Market</span>
                </h1>

            </div>

        </div>

    </div>

</div>

<script>

const form =
    document.getElementById('resetForm');

const message =
    document.getElementById('message');



const params =
    new URLSearchParams(
        window.location.search
    );

const token =
    params.get('token');



form.addEventListener('submit', async (e) => {

    e.preventDefault();

    const password =
        document.getElementById('password').value;



    try {

        const response =
            await fetch(

                'http://127.0.0.1:3000/api/reset-password',

                {
                    method:'POST',

                    headers:{
                        'Content-Type':'application/json'
                    },

                    body:JSON.stringify({
                        token,
                        password
                    })
                }

            );



        const data =
            await response.json();



        if(data.success){

            message.style.color =
                'green';

            message.innerText =
                data.message;

            setTimeout(() => {

                window.location.href =
                    'login.html';

            }, 2000);

        }
        else{

            message.style.color =
                'red';

            message.innerText =
                data.message;

        }

    }

    catch (error) {

        message.innerText =
            'Lỗi server';

    }

});

</script>

</body>
</html>
